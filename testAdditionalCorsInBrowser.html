
<!DOCTYPE html>
<html>
<head>
    <title>额外CORS数据源测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { margin: 5px; padding: 10px; }
    </style>
</head>
<body>
    <h1>额外CORS数据源测试</h1>
    <div>
        <button onclick="testAllDataSources()">测试所有数据源</button>
        <button onclick="testXueQiuCors()">测试雪球CORS</button>
        <button onclick="testTHSCors()">测试同花顺CORS</button>
    </div>
    <div id="results"></div>

    <script>
        function addResult(message, isSuccess) {
            const resultsDiv = document.getElementById('results');
            const div = document.createElement('div');
            div.className = 'result ' + (isSuccess ? 'success' : 'error');
            div.textContent = message;
            resultsDiv.appendChild(div);
        }

        async function testXueQiuCors() {
            addResult('开始测试雪球CORS数据源...', true);
            try {
                const response = await fetch('https://xueqiu.com/service/v5/stock/screener/quote/list?symbol=SH600519&count=1&order_by=percent&order=desc', {
                    headers: {
                        'Referer': 'https://xueqiu.com/',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
                    }
                });
                const data = await response.text();
                addResult('雪球CORS数据源测试成功! 响应长度: ' + data.length, true);
            } catch (error) {
                addResult('雪球CORS数据源测试失败: ' + error.message, false);
            }
        }

        async function testTHSCors() {
            addResult('开始测试同花顺CORS数据源...', true);
            try {
                const response = await fetch('https://api.10jqka.com.cn/v1/quote/newest?codes=sh600519', {
                    headers: {
                        'Referer': 'https://www.10jqka.com.cn/',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
                    }
                });
                const data = await response.text();
                addResult('同花顺CORS数据源测试成功! 响应长度: ' + data.length, true);
            } catch (error) {
                addResult('同花顺CORS数据源测试失败: ' + error.message, false);
            }
        }

        async function testAllDataSources() {
            document.getElementById('results').innerHTML = '';
            await testXueQiuCors();
            await testTHSCors();
        }
    </script>
</body>
</html>
