
<!DOCTYPE html>
<html>
<head>
    <title>CORS数据源测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { margin: 5px; padding: 10px; }
    </style>
</head>
<body>
    <h1>CORS数据源测试</h1>
    <div>
        <button onclick="testAllDataSources()">测试所有数据源</button>
        <button onclick="testSinaCors()">测试新浪CORS</button>
        <button onclick="testTencentCors()">测试腾讯CORS</button>
        <button onclick="testNeteaseCors()">测试网易CORS</button>
    </div>
    <div id="results"></div>

    <script>
        function addResult(message, isSuccess) {
            const resultsDiv = document.getElementById('results');
            const div = document.createElement('div');
            div.className = 'result ' + (isSuccess ? 'success' : 'error');
            div.textContent = message;
            resultsDiv.appendChild(div);
        }

        async function testSinaCors() {
            addResult('开始测试新浪CORS数据源...', true);
            try {
                const response = await fetch('https://hq.sinajs.cn/list=sh600519,sz002594', {
                    headers: {
                        'Referer': 'https://finance.sina.com.cn/',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
                    }
                });
                const data = await response.text();
                addResult('新浪CORS数据源测试成功! 响应长度: ' + data.length, true);
            } catch (error) {
                addResult('新浪CORS数据源测试失败: ' + error.message, false);
            }
        }

        async function testTencentCors() {
            addResult('开始测试腾讯CORS数据源...', true);
            try {
                const response = await fetch('https://qt.gtimg.cn/q=sh600519,sz002594', {
                    headers: {
                        'Referer': 'https://finance.qq.com/',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
                    }
                });
                const data = await response.text();
                addResult('腾讯CORS数据源测试成功! 响应长度: ' + data.length, true);
            } catch (error) {
                addResult('腾讯CORS数据源测试失败: ' + error.message, false);
            }
        }

        async function testNeteaseCors() {
            addResult('开始测试网易CORS数据源...', true);
            try {
                const response = await fetch('https://api.money.126.net/data/feed/0600519,13002594', {
                    headers: {
                        'Referer': 'https://quotes.money.163.com/',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
                    }
                });
                const data = await response.text();
                addResult('网易CORS数据源测试成功! 响应长度: ' + data.length, true);
            } catch (error) {
                addResult('网易CORS数据源测试失败: ' + error.message, false);
            }
        }

        async function testAllDataSources() {
            document.getElementById('results').innerHTML = '';
            await testSinaCors();
            await testTencentCors();
            await testNeteaseCors();
        }
    </script>
</body>
</html>
