<!DOCTYPE html>
<html>
<head>
    <title>AI预测功能调试</title>
    <script type="module">
        // 测试历史数据获取
        async function testHistoricalData() {
            console.log('开始测试历史数据获取...');
            
            try {
                // 直接测试东方财富API
                const stockCode = 'sh600519'; // 贵州茅台
                let cleanCode = stockCode;
                if (stockCode.startsWith('sh')) {
                    cleanCode = stockCode.substring(2);
                } else if (stockCode.startsWith('sz')) {
                    cleanCode = stockCode.substring(2);
                }
                
                const marketCode = cleanCode.startsWith('6') ? '1' : '0';
                const secid = `${marketCode}.${cleanCode}`;
                
                const response = await fetch(`https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${secid}&klt=101&fqt=1&end=${Date.now()}&lmt=100`, {
                    headers: {
                        'Referer': 'https://quote.eastmoney.com/',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
                    }
                });
                
                const data = await response.json();
                console.log('东方财富API响应:', data);
                
                if (data.data && data.data.kline) {
                    console.log('成功获取历史数据，共', data.data.kline.length, '条');
                    console.log('数据样本:', data.data.kline.slice(0, 3));
                } else {
                    console.error('API返回数据格式错误:', data);
                }
                
            } catch (error) {
                console.error('历史数据获取失败:', error);
            }
        }
        
        // 页面加载时运行测试
        window.addEventListener('load', testHistoricalData);
    </script>
</head>
<body>
    <h1>AI预测功能调试</h1>
    <p>请打开浏览器控制台查看调试信息</p>
</body>
</html>
